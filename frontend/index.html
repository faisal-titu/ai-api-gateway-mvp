<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Search Gallery</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1>AI Image Search</h1>
            <p>Search 25,000+ images using natural language</p>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput"
                    placeholder="Describe an image (e.g., 'a peaceful sunset in the mountains')...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="upload-section">
                <span>or upload an image:</span>
                <label for="imageUpload" class="upload-btn">
                    <i class="fas fa-camera"></i> Upload
                </label>
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            </div>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Searching thousands of images...</p>
        </div>

        <div id="results-count" class="hidden">Found <span id="count">0</span> matches</div>

        <div class="gallery" id="gallery">
            <!-- Images will be injected here -->
        </div>

        <footer>
            <p>Powered by CLIP + OpenSearch on AWS</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
